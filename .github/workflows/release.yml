name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest coverage ruff mypy build pip-audit

      - name: Compile
        run: python -m compileall -q src tests

      - name: Ruff
        run: python -m ruff check src tests

      - name: Mypy
        run: python -m mypy src

      - name: Coverage
        run: |
          python -m coverage run -m pytest -q
          python -m coverage report

      - name: Build Artifacts
        run: python -m build

      - name: Generate SBOM
        run: pip-audit -r requirements.txt -f cyclonedx-json -o dist/bunkermedia-sbom.cdx.json

      - name: Export Dependency Manifest
        run: pip freeze --all > dist/dependencies.txt

      - name: Generate Artifact Checksums
        run: |
          cd dist
          sha256sum * > sha256sums.txt

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bunkermedia-dist
          path: dist/*

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
