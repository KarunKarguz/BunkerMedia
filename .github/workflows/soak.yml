name: Soak Validation

on:
  schedule:
    - cron: "0 2 * * 0"
  workflow_dispatch:

jobs:
  soak:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run soak validation
        run: python scripts/run_soak_validation.py --cycles 80 --seed-jobs 18 --batch-jobs 6 --restarts 2 --output soak-summary.json

      - name: Upload soak summary
        uses: actions/upload-artifact@v4
        with:
          name: soak-summary
          path: soak-summary.json
