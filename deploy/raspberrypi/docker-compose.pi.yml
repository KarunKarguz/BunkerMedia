version: "3.9"

services:
  bunkermedia:
    build: ../..
    container_name: bunkermedia-pi
    ports:
      - "8080:8080"
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - ../../deploy/raspberrypi/config.pi.yaml:/app/config.yaml
      - ../../media:/app/media
      - ../../logs:/app/logs
      - ../../backups:/app/backups
      - ../../bunkermedia.db:/app/bunkermedia.db
      - ../../archive.txt:/app/archive.txt
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=5)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    command: ["bunker", "--config", "/app/config.yaml", "serve", "--host", "0.0.0.0", "--port", "8080"]
